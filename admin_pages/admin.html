<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ Панел</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Baloo+2:wght@500;700;800&family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fredoka', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">
    <nav class="bg-white shadow-md border-b-4 border-green-500 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-green-700">Админ Контрола</h1>
            <a href="/logout" class="bg-red-500 text-white font-bold py-2 px-4 rounded hover:bg-red-600 transition-colors shadow-[0_3px_0_#b91c1c]">
                Одјави се
            </a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 mt-6">
        <div class="bg-white rounded-2xl shadow-lg p-6 border-2 border-gray-200">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Добредојдовте во Админ Панелот!</h2>
            <p class="text-gray-600 mb-6">Ова е безбедна зона само за администратори.</p>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Example Stat Card -->
                <div class="p-6 bg-blue-50 rounded-xl border border-blue-200">
                    <h3 class="text-blue-800 font-bold mb-2">Статистика 1</h3>
                    <p class="text-3xl font-black text-blue-600">42</p>
                </div>
                
                <div class="p-6 bg-green-50 rounded-xl border border-green-200">
                    <h3 class="text-green-800 font-bold mb-2">Статистика 2</h3>
                    <p class="text-3xl font-black text-green-600">128</p>
                </div>
                
                <div class="p-6 bg-purple-50 rounded-xl border border-purple-200">
                    <h3 class="text-purple-800 font-bold mb-2">Статистика 3</h3>
                    <p class="text-3xl font-black text-purple-600">7</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
