<!doctype html>
<html lang="mk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админ Најава</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Baloo+2:wght@500;700;800&family=Fredoka:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Fredoka", sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#a8edea] min-h-screen flex items-center justify-center p-4">
    <div
      class="bg-white rounded-3xl shadow-xl w-full max-w-md p-8 border-4 border-[#D4CFA3]"
    >
      <h1 class="text-3xl font-black text-center text-green-700 mb-6">
        Админ Панел
      </h1>

      <form action="/auth" method="POST" class="space-y-4">
        <div>
          <label for="password" class="block font-bold text-gray-700 mb-1"
            >Лозинка</label
          >
          <input
            type="password"
            id="password"
            name="password"
            required
            class="w-full px-4 py-3 rounded-xl border-2 border-gray-300 focus:border-green-500 focus:outline-none transition-colors"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-[#4CAF50] text-white text-xl font-black py-3 rounded-xl shadow-[0_4px_0_#2E7D32] hover:translate-y-1 hover:shadow-none transition-all mt-4"
        >
          Најава
        </button>
      </form>
    </div>
  </body>
</html>
